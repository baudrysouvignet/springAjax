# On initialise la base avec un petit jeu de test (dans src/test/resources)
spring.sql.init.data-locations=classpath:test_data.sql
# On initialise la BD APRES la creation du schema relationnel
spring.jpa.defer-datasource-initialization=true
# Afficher les requetes SQL dans les logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.pharmacie=INFO

# Configuration mail pour les tests (nécessaire pour le bean JavaMailSender)
spring.mail.host=localhost
spring.mail.port=25
# Désactiver le health check mail dans les tests
management.health.mail.enabled=false
