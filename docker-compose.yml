services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pharmacie} -d ${POSTGRES_DB:-pharmacie}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  app-create:
    build: .
    restart: unless-stopped
    profiles: ["create"]
    env_file: .env
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: create
      JDBC_URI: jdbc:postgresql://db:5432/${POSTGRES_DB:-pharmacie}?user=${POSTGRES_USER:-pharmacie}&password=${POSTGRES_PASSWORD:-pharmacie}
    depends_on:
      db:
        condition: service_healthy

  app-deploy:
    build: .
    restart: unless-stopped
    profiles: ["deploy"]
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: deploy
      JDBC_URI: jdbc:postgresql://db:5432/${POSTGRES_DB:-pharmacie}?user=${POSTGRES_USER:-pharmacie}&password=${POSTGRES_PASSWORD:-pharmacie}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
